name: Build and Release

on:
  push:
    tags:
      - 'v*' # Push events to matching v*, i.e. v1.0, v20.15.10
  workflow_dispatch: # Allows manual trigger

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Setup NuGet
      uses: NuGet/setup-nuget@v1

    - name: Restore NuGet packages
      run: nuget restore SoundEffect.csproj

    - name: Build for Release (x64)
      run: msbuild SoundEffect.csproj /p:Configuration=Release /p:Platform=x64

    - name: Prepare Release Artifacts
      shell: pwsh
      run: |
        mkdir release-artifacts
        cp bin/Release/* release-artifacts/ -Recurse
        Compress-Archive -Path release-artifacts/* -DestinationPath SoundEffect-Release.zip

    - name: Create Release and Upload Asset
      uses: softprops/action-gh-release@v2
      if: startsWith(github.ref, 'refs/tags/')
      with:
        files: SoundEffect-Release.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
