name: Build and Release

on:
  push:
    tags:
      - 'v*' # Chạy tự động khi bạn tạo tag dạng v1.0, v2.0...
  workflow_dispatch: # Cho phép bạn kích hoạt thủ công từ CMD bằng gh CLI

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Setup NuGet
      uses: NuGet/setup-nuget@v1

    - name: Restore NuGet packages
      run: nuget restore SoundEffect.csproj -PackagesDirectory ..

    - name: Build for Release (x64)
      run: msbuild SoundEffect.csproj /p:Configuration=Release /p:Platform=x64 /p:SkipLinkCheck=true

    # Đã sửa: Cập nhật chính xác đường dẫn bin/x64/Release/ cho cấu hình x64
    - name: Prepare Release Artifacts
      shell: pwsh
      run: |
        if (Test-Path release-artifacts) { Remove-Item release-artifacts -Recurse -Force }
        mkdir release-artifacts
        if (Test-Path bin/x64/Release) {
            cp bin/x64/Release/* release-artifacts/ -Recurse -ErrorAction SilentlyContinue
        } else {
            cp bin/Release/* release-artifacts/ -Recurse -ErrorAction SilentlyContinue
        }
        Compress-Archive -Path release-artifacts/* -DestinationPath SoundEffect-Release.zip

    - name: Create Release and Upload Asset
      uses: softprops/action-gh-release@v2
      if: startsWith(github.ref, 'refs/tags/')
      with:
        files: SoundEffect-Release.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}